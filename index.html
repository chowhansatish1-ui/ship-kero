<!DOCTYPE html><html>
<head>
  <title>Ship Kero</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    h1 { color:#38bdf8; }
    #products { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; }
    .product { background:#1e293b; padding:15px; border-radius:10px; width:200px; }
    .product img { width:100%; border-radius:10px; }
    button { margin:5px; padding:8px; border:none; border-radius:5px; background:#38bdf8; color:black; cursor:pointer; }.admin { margin:20px; padding:15px; background:#1e293b; border-radius:10px; }
input { padding:8px; margin:5px; }

  </style>
</head><body><h1>🚀 Ship Kero</h1><!-- ADMIN PANEL --><div class="admin">
  <h2>Admin Panel ⚙️</h2>
  <input id="pname" placeholder="Product Name">
  <input id="pprice" placeholder="Price">
  <input id="pimg" placeholder="Image URL">
  <br>
  <button onclick="addProduct()">Add Product</button>
</div><div id="products"></div><h2>Cart 🛒</h2>
<ul id="cart"></ul>
<h3 id="total">Total: ₹0</h3><button onclick="whatsappOrder()">Order via WhatsApp 📱</button>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Bluetooth Earbuds", price:999, img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad"},
  {name:"Smart Watch", price:1499, img:"https://images.unsplash.com/photo-1518444028785-8fbcd101ebb9"}
];

let cart = [];

function saveProducts(){
  localStorage.setItem("products", JSON.stringify(products));
}

function displayProducts(){
  let productDiv = document.getElementById("products");
  productDiv.innerHTML = "";

  products.forEach((p, index) => {
    let div = document.createElement("div");
    div.className = "product";
    div.innerHTML = `
      <img src="${p.img}" />
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="addToCart(${index})">Add to Cart</button>
      <button onclick="deleteProduct(${index})">Delete ❌</button>
    `;
    productDiv.appendChild(div);
  });
}

function addProduct(){
  let name = document.getElementById("pname").value;
  let price = document.getElementById("pprice").value;
  let img = document.getElementById("pimg").value;

  if(!name || !price || !img){
    alert("Fill all fields!");
    return;
  }

  products.push({name, price, img});
  saveProducts();
  displayProducts();

  document.getElementById("pname").value = "";
  document.getElementById("pprice").value = "";
  document.getElementById("pimg").value = "";
}

function deleteProduct(index){
  products.splice(index,1);
  saveProducts();
  displayProducts();
}

function addToCart(index){
  cart.push(products[index]);
  displayCart();
}

function displayCart(){
  let cartList = document.getElementById("cart");
  cartList.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += Number(item.price);
    cartList.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

function whatsappOrder(){
  let name = prompt("Enter your name:");
  let address = prompt("Enter your address:");

  if(cart.length === 0){
    alert("Cart empty!");
    return;
  }

  let text = "🛒 Order - Ship Kero %0A%0A";
  let total = 0;

  cart.forEach(item => {
    text += "• " + item.name + " - ₹" + item.price + "%0A";
    total += Number(item.price);
  });

  text += "%0A💰 Total: ₹" + total;
  text += "%0A👤 Name: " + name;
  text += "%0A📍 Address: " + address;

  window.open("https://wa.me/919000883973?text=" + text);
}

displayProducts();

</script></body>
</html>
