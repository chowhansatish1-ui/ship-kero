<!DOCTYPE html><html>
<head>
  <title>Ship Kero</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    h1 { color:#38bdf8; }
    #products { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; }
    .product { background:#1e293b; padding:15px; border-radius:10px; width:200px; }
    .product img { width:100%; border-radius:10px; }
    button { margin:5px; padding:10px; border:none; border-radius:5px; background:#38bdf8; color:black; }
  </style>
</head>
<body><h1>🚀 Ship Kero</h1><div id="products"></div><h2>Cart 🛒</h2>
<ul id="cart"></ul>
<h3 id="total">Total: ₹0</h3><button onclick="checkout()">Pay Now 💳</button> <button onclick="whatsappOrder()">Order via WhatsApp 📱</button>

<script>
let products = [
  {name: "Bluetooth Earbuds", price: 999, img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad"},
  {name: "Smart Watch", price: 1499, img:"https://images.unsplash.com/photo-1518444028785-8fbcd101ebb9"},
  {name: "Power Bank", price: 799, img:"https://images.unsplash.com/photo-1580910051074-3eb694886505"}
];

let cart = [];

let productDiv = document.getElementById("products");

products.forEach((p, index) => {
  let div = document.createElement("div");
  div.className = "product";
  div.innerHTML = `
    <img src="${p.img}" />
    <h3>${p.name}</h3>
    <p>₹${p.price}</p>
    <button onclick="addToCart(${index})">Add to Cart</button>
  `;
  productDiv.appendChild(div);
});

function addToCart(index){
  cart.push(products[index]);
  displayCart();
}

function displayCart(){
  let cartList = document.getElementById("cart");
  cartList.innerHTML = "";

  let total = 0;

  cart.forEach((item) => {
    total += item.price;
    cartList.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

function checkout(){
  alert("Razorpay integration next step 🔥");
}

function whatsappOrder(function whatsappOrder(){
let name = prompt("Enter your name:");
let address = prompt("Enter your delivery address:");

if(cart.length === 0){
alert("Cart is empty!");
return;
}

let text = "🛒 New Order - Ship Kero %0A%0A";

let total = 0;

cart.forEach(item => {
text += "• " + item.name + " - ₹" + item.price + "%0A";
total += item.price;
});

text += "%0A💰 Total: ₹" + total;
text += "%0A👤 Name: " + name;
text += "%0A📍 Address: " + address;
text += "%0A%0A✅ Please confirm order";

window.open("https://wa.me/919000883973?text=" + text);
}){
  let text = "Order:%0A";
  cart.forEach(item => {
    text += item.name + " - ₹" + item.price + "%0A";
  });

  window.open("https://wa.me/919000883973?text=" + text);
}
</script></body>
</html>
